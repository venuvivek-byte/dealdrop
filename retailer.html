<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DealDrop – Retailer Dashboard</title>
  <meta name="description" content="Post flash deals for your shop and reach nearby customers instantly with DealDrop.">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <h1>
    <span class="logo-icon">🏷️</span>
    DealDrop
  </h1>
  <div class="nav-links">
    <a href="index.html">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Customer View
    </a>
    <a href="#" id="logoutBtn" style="display:none;" class="btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </a>
  </div>
</nav>

<!-- ── AUTH SECTION ── -->
<div id="authSection">
  <div class="auth-box fade-in-scale">
    <h2>Retailer Portal</h2>
    <p class="auth-subtitle">Post deals & reach nearby customers instantly</p>

    <div id="loginForm">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="you@shop.com" />
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" />
      <button onclick="login()">Sign In →</button>
      <p class="msg">New here? <a onclick="toggleAuth()">Create an account</a></p>
    </div>

    <div id="signupForm" style="display:none;">
      <label>Shop Name</label>
      <input type="text" id="shopName" placeholder="e.g. Fresh Mart" />
      <label>Email Address</label>
      <input type="email" id="signupEmail" placeholder="you@shop.com" />
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min 6 characters" />
      <button onclick="signup()">Create Account →</button>
      <p class="msg">Already have an account? <a onclick="toggleAuth()">Sign in</a></p>
    </div>

    <p id="authError" style="color:#f43f5e; text-align:center; margin-top:14px; font-size:0.88rem; font-weight:500; position:relative; z-index:1;"></p>
  </div>
</div>

<!-- ── RETAILER DASHBOARD ── -->
<div id="dashboard" style="display:none;">
  <div class="container">

    <!-- Stats -->
    <div class="stats-bar fade-in-up">
      <div class="stat-item">
        <div class="stat-value" id="myActiveDeals">0</div>
        <div class="stat-label">Active Deals</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="myTotalDeals">0</div>
        <div class="stat-label">Total Posted</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="myExpiredDeals">0</div>
        <div class="stat-label">Expired</div>
      </div>
    </div>

    <!-- Post Deal Form -->
    <div class="form-card fade-in-up stagger-1">
      <h3>➕ Post a New Deal</h3>
      <p class="subtitle">Create a flash deal to attract nearby customers</p>

      <div class="form-grid">
        <div class="full-width">
          <label>Product Name</label>
          <input type="text" id="productName" placeholder="e.g. Fresh Organic Apples" />
        </div>

        <div>
          <label>Original Price (₹)</label>
          <input type="number" id="originalPrice" placeholder="e.g. 200" />
        </div>

        <div>
          <label>Discounted Price (₹)</label>
          <input type="number" id="dealPrice" placeholder="e.g. 100" />
        </div>

        <div>
          <label>Category</label>
          <select id="category">
            <option value="Groceries">🥬 Groceries</option>
            <option value="Bakery">🍞 Bakery</option>
            <option value="Dairy">🥛 Dairy</option>
            <option value="Electronics">📱 Electronics</option>
            <option value="Clothing">👕 Clothing</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>

        <div>
          <label>Deal Duration</label>
          <select id="expiresIn">
            <option value="1">⏱️ 1 Hour</option>
            <option value="2">⏱️ 2 Hours</option>
            <option value="4">⏱️ 4 Hours</option>
            <option value="8">⏱️ 8 Hours</option>
            <option value="24">⏱️ 24 Hours</option>
          </select>
        </div>

        <div class="full-width">
          <label>Shop Location</label>
          <div style="display:flex; gap:10px; align-items:flex-start;">
            <input type="text" id="shopAddress" placeholder="e.g. 12 Anna Nagar, Chennai" style="flex:1;" />
            <button type="button" onclick="useCurrentLocation()" class="secondary" style="white-space:nowrap; margin-top:8px; padding:12px 18px;" id="gpsBtn">
              📍 Use GPS
            </button>
          </div>
          <p id="locationStatus" style="font-size:0.8rem; color:var(--accent-light); margin-top:-12px; margin-bottom:14px; display:none; position:relative; z-index:1;"></p>
        </div>
      </div>

      <button onclick="postDeal()" class="primary" style="width:100%; margin-top:8px; padding:15px; font-size:0.95rem; position:relative; z-index:1;">
        🚀 Post Deal
      </button>
    </div>

    <!-- My Deals -->
    <div class="section-title fade-in-up stagger-2">
      <span class="icon">📦</span> My Deals
      <span class="count" id="myDealCount">0</span>
    </div>
    <div id="myDeals" class="deal-grid">
      <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line long"></div><div class="skeleton skeleton-line medium"></div></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, where, onSnapshot, Timestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDEWiFeBiiXflPa7ADL6ijQ7NcMubIZScQ",
    authDomain: "dealdrop-16ea7.firebaseapp.com",
    projectId: "dealdrop-16ea7",
    storageBucket: "dealdrop-16ea7.firebasestorage.app",
    messagingSenderId: "482243986322",
    appId: "1:482243986322:web:7f74b0dcfa5cf5222fb74b",
    measurementId: "G-TTK180DJD5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;

  // ── Navbar scroll ──
  window.addEventListener('scroll', () => {
    document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 10);
  });

  // ── AUTH STATE ──
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'inline-flex';
      loadMyDeals();
    } else {
      currentUser = null;
      document.getElementById('authSection').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'none';
    }
  });

  // ── TOGGLE AUTH ──
  window.toggleAuth = () => {
    const lf = document.getElementById('loginForm');
    const sf = document.getElementById('signupForm');
    lf.style.display = lf.style.display === 'none' ? 'block' : 'none';
    sf.style.display = sf.style.display === 'none' ? 'block' : 'none';
    document.getElementById('authError').textContent = '';
  };

  // ── SIGNUP ──
  window.signup = async () => {
    const shopName = document.getElementById('shopName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    if (!shopName || !email || !password) {
      document.getElementById('authError').textContent = 'Please fill all fields.';
      return;
    }
    try {
      await createUserWithEmailAndPassword(auth, email, password);
      localStorage.setItem('shopName', shopName);
      showToast('Account created! Welcome to DealDrop 🎉');
    } catch (e) {
      document.getElementById('authError').textContent = e.message;
    }
  };

  // ── LOGIN ──
  window.login = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) {
      document.getElementById('authError').textContent = 'Please fill all fields.';
      return;
    }
    try {
      await signInWithEmailAndPassword(auth, email, password);
      showToast('Welcome back! 👋');
    } catch (e) {
      document.getElementById('authError').textContent = 'Invalid email or password.';
    }
  };

  // ── LOGOUT ──
  document.getElementById('logoutBtn').addEventListener('click', (e) => {
    e.preventDefault();
    signOut(auth);
    showToast('Logged out successfully');
  });

  // ── USE CURRENT LOCATION ──
  window._gpsLat = null;
  window._gpsLng = null;

  window.useCurrentLocation = () => {
    const btn = document.getElementById('gpsBtn');
    const statusEl = document.getElementById('locationStatus');

    if (!navigator.geolocation) {
      showToast('❌ Geolocation not supported');
      return;
    }

    btn.innerHTML = '⏳ Detecting...';
    btn.disabled = true;
    statusEl.style.display = 'block';
    statusEl.textContent = 'Detecting your location...';
    statusEl.style.color = 'var(--accent-light)';

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        window._gpsLat = pos.coords.latitude;
        window._gpsLng = pos.coords.longitude;

        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
          const data = await res.json();
          document.getElementById('shopAddress').value = data.display_name || `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        } catch (e) {
          document.getElementById('shopAddress').value = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        }

        statusEl.textContent = `✅ GPS location detected (${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)})`;
        statusEl.style.color = '#34d399';
        btn.innerHTML = '✅ Located';
        btn.disabled = false;
        showToast('📍 Location detected!');
      },
      () => {
        btn.innerHTML = '📍 Use GPS';
        btn.disabled = false;
        statusEl.textContent = '❌ Could not detect location. Allow location access and try again.';
        statusEl.style.color = '#f43f5e';
        showToast('❌ Location access denied');
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  };

  document.getElementById('shopAddress').addEventListener('input', () => {
    window._gpsLat = null;
    window._gpsLng = null;
    document.getElementById('locationStatus').style.display = 'none';
    document.getElementById('gpsBtn').innerHTML = '📍 Use GPS';
  });

  // ── POST DEAL ──
  window.postDeal = async () => {
    const btn = document.querySelector('button.primary');
    const productName = document.getElementById('productName').value.trim();
    const originalPrice = parseFloat(document.getElementById('originalPrice').value);
    const dealPrice = parseFloat(document.getElementById('dealPrice').value);
    const category = document.getElementById('category').value;
    const expiresInHours = parseInt(document.getElementById('expiresIn').value);
    const shopAddress = document.getElementById('shopAddress').value.trim();
    const shopName = localStorage.getItem('shopName') || 'My Shop';

    if (!productName || !originalPrice || !dealPrice || !shopAddress) {
      showToast('⚠️ Please fill all fields!');
      return;
    }
    if (dealPrice >= originalPrice) {
      showToast('⚠️ Deal price must be less than original!');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '⏳ Posting deal...';

    const expiresAt = new Date();
    expiresAt.setHours(expiresAt.getHours() + expiresInHours);

    let lat = window._gpsLat || null;
    let lng = window._gpsLng || null;

    if (!lat || !lng) {
      lat = 13.0827; lng = 80.2707;
      try {
        const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(shopAddress)}&countrycodes=in&limit=1`);
        const geoData = await geoRes.json();
        if (geoData.length > 0) {
          lat = parseFloat(geoData[0].lat);
          lng = parseFloat(geoData[0].lon);
        } else {
          showToast('⚠️ Address not found. Try "Use GPS" instead.');
          btn.disabled = false;
          btn.innerHTML = '🚀 Post Deal';
          return;
        }
      } catch (e) {
        console.log('Geocoding failed');
      }
    }

    try {
      await addDoc(collection(db, 'deals'), {
        productName, originalPrice, dealPrice,
        discount: Math.round(((originalPrice - dealPrice) / originalPrice) * 100),
        category, shopName, shopAddress, lat, lng,
        retailerId: currentUser.uid,
        createdAt: Timestamp.now(),
        expiresAt: Timestamp.fromDate(expiresAt),
        active: true
      });
      showToast('Deal posted successfully! 🚀');
      ['productName','originalPrice','dealPrice','shopAddress'].forEach(id => {
        document.getElementById(id).value = '';
      });
      window._gpsLat = null;
      window._gpsLng = null;
      document.getElementById('locationStatus').style.display = 'none';
      document.getElementById('gpsBtn').innerHTML = '📍 Use GPS';
    } catch (e) {
      showToast('❌ Error posting deal');
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '🚀 Post Deal';
    }
  };

  // ── MY DEALS ──
  function loadMyDeals() {
    const q = query(collection(db, 'deals'), where('retailerId', '==', currentUser.uid));

    onSnapshot(q, (snapshot) => {
      const container = document.getElementById('myDeals');
      if (snapshot.empty) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="icon">📦</div>
            <p>No deals posted yet.</p>
            <p class="sub">Post your first deal above to get started!</p>
          </div>`;
        ['myDealCount','myActiveDeals','myTotalDeals','myExpiredDeals'].forEach(id => {
          document.getElementById(id).textContent = 0;
        });
        return;
      }

      container.innerHTML = '';
      const now = new Date();
      let activeCount = 0, expiredCount = 0;

      snapshot.forEach(doc => {
        const d = doc.data();
        const expiry = d.expiresAt.toDate();
        const isExpired = expiry < now;
        isExpired ? expiredCount++ : activeCount++;

        const card = document.createElement('div');
        card.className = `card ${isExpired ? 'expired' : ''} fade-in-up`;
        card.innerHTML = `
          <div class="badge-row">
            <span class="badge badge-category">${d.category}</span>
            ${isExpired
              ? '<span class="badge" style="background:rgba(255,255,255,0.06);color:var(--text-muted);border:1px solid rgba(255,255,255,0.08);">Expired</span>'
              : '<span class="badge badge-active">✅ Active</span>'}
          </div>
          <h3>${d.productName}</h3>
          <p>🏪 ${d.shopName}</p>
          <p>📍 ${d.shopAddress}</p>
          <div class="price-row">
            <span class="original-price">₹${d.originalPrice}</span>
            <span class="deal-price">₹${d.dealPrice}</span>
            <span class="discount-tag">${d.discount}% OFF</span>
          </div>
          ${!isExpired ? `<div class="countdown" data-expiry="${expiry.toISOString()}">⏳ ${getTimeLeft(expiry)} left</div>` : ''}
        `;
        container.appendChild(card);
      });

      document.getElementById('myDealCount').textContent = snapshot.size;
      document.getElementById('myActiveDeals').textContent = activeCount;
      document.getElementById('myTotalDeals').textContent = snapshot.size;
      document.getElementById('myExpiredDeals').textContent = expiredCount;
    });
  }

  // ── LIVE TIMERS ──
  setInterval(() => {
    document.querySelectorAll('.countdown[data-expiry]').forEach(el => {
      const expiry = new Date(el.dataset.expiry);
      const tl = getTimeLeft(expiry);
      el.innerHTML = tl === 'Expired' ? '❌ Expired' : `⏳ ${tl} left`;
    });
  }, 1000);

  // ── HELPERS ──
  function getTimeLeft(expiryDate) {
    const diff = expiryDate - new Date();
    if (diff <= 0) return 'Expired';
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    if (h === 0 && m === 0) return `${s}s`;
    if (h === 0) return `${m}m ${s}s`;
    return `${h}h ${m}m`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }
</script>

</body>
</html>
