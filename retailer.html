<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DealDrop – Retailer Dashboard</title>
  <meta name="description" content="Post flash deals for your shop and reach nearby customers instantly with DealDrop.">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <h1>🏷️ DealDrop</h1>
  <div class="nav-links">
    <a href="index.html">← Customer View</a>
    <a href="#" id="logoutBtn" style="display:none;" class="btn-primary">Logout</a>
  </div>
</nav>

<!-- ── AUTH SECTION ── -->
<div id="authSection">
  <div class="auth-box">
    <h2>Retailer Portal</h2>
    <div id="loginForm">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@shop.com" />
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" />
      <button onclick="login()">Login →</button>
      <p class="msg">No account? <a onclick="toggleAuth()">Sign up here</a></p>
    </div>

    <div id="signupForm" style="display:none;">
      <label>Shop Name</label>
      <input type="text" id="shopName" placeholder="e.g. Fresh Mart" />
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="you@shop.com" />
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="min 6 characters" />
      <button onclick="signup()">Create Account →</button>
      <p class="msg">Have an account? <a onclick="toggleAuth()">Login</a></p>
    </div>

    <p id="authError" style="color:#ff6b6b; text-align:center; margin-top:14px; font-size:0.9rem;"></p>
  </div>
</div>

<!-- ── RETAILER DASHBOARD ── -->
<div id="dashboard" style="display:none;">
  <div class="container">

    <!-- Stats Bar -->
    <div class="stats-bar fade-in-up">
      <div class="stat-item">
        <div class="stat-value" id="myActiveDeals">0</div>
        <div class="stat-label">Active Deals</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="myTotalDeals">0</div>
        <div class="stat-label">Total Posted</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="myExpiredDeals">0</div>
        <div class="stat-label">Expired</div>
      </div>
    </div>

    <!-- Post a Deal -->
    <div class="card fade-in-up stagger-1">
      <h3 style="font-family:'Outfit',sans-serif; font-size:1.3rem; margin-bottom:4px;">➕ Post a New Deal</h3>
      <p style="color:var(--text-muted); margin-bottom:20px; font-size:0.85rem;">Fill in the details below to create a flash deal for nearby customers</p>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 16px;">
        <div style="grid-column:1/-1;">
          <label>Product Name</label>
          <input type="text" id="productName" placeholder="e.g. Fresh Apples" />
        </div>

        <div>
          <label>Original Price (₹)</label>
          <input type="number" id="originalPrice" placeholder="e.g. 100" />
        </div>

        <div>
          <label>Discounted Price (₹)</label>
          <input type="number" id="dealPrice" placeholder="e.g. 60" />
        </div>

        <div>
          <label>Category</label>
          <select id="category">
            <option value="Groceries">🥬 Groceries</option>
            <option value="Bakery">🍞 Bakery</option>
            <option value="Dairy">🥛 Dairy</option>
            <option value="Electronics">📱 Electronics</option>
            <option value="Clothing">👕 Clothing</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>

        <div>
          <label>Deal Expires In</label>
          <select id="expiresIn">
            <option value="1">⏱️ 1 Hour</option>
            <option value="2">⏱️ 2 Hours</option>
            <option value="4">⏱️ 4 Hours</option>
            <option value="8">⏱️ 8 Hours</option>
            <option value="24">⏱️ 24 Hours</option>
          </select>
        </div>

        <div style="grid-column:1/-1;">
          <label>Shop Address (for map pin)</label>
          <input type="text" id="shopAddress" placeholder="e.g. 12 Anna Nagar, Chennai" />
        </div>
      </div>

      <button onclick="postDeal()" class="primary" style="width:100%; margin-top:8px;">
        🚀 Post Deal
      </button>
    </div>

    <!-- My Active Deals -->
    <p class="section-title fade-in-up stagger-2">
      📦 My Deals
      <span class="count" id="myDealCount">0</span>
    </p>
    <div id="myDeals" class="deal-grid">
      <div class="skeleton-card">
        <div class="skeleton skeleton-line short"></div>
        <div class="skeleton skeleton-line long"></div>
        <div class="skeleton skeleton-line medium"></div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, where, onSnapshot, Timestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDEWiFeBiiXflPa7ADL6ijQ7NcMubIZScQ",
    authDomain: "dealdrop-16ea7.firebaseapp.com",
    projectId: "dealdrop-16ea7",
    storageBucket: "dealdrop-16ea7.firebasestorage.app",
    messagingSenderId: "482243986322",
    appId: "1:482243986322:web:7f74b0dcfa5cf5222fb74b",
    measurementId: "G-TTK180DJD5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;

  // ── AUTH STATE ──
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'inline-flex';
      loadMyDeals();
    } else {
      currentUser = null;
      document.getElementById('authSection').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'none';
    }
  });

  // ── TOGGLE LOGIN/SIGNUP ──
  window.toggleAuth = () => {
    const lf = document.getElementById('loginForm');
    const sf = document.getElementById('signupForm');
    lf.style.display = lf.style.display === 'none' ? 'block' : 'none';
    sf.style.display = sf.style.display === 'none' ? 'block' : 'none';
    document.getElementById('authError').textContent = '';
  };

  // ── SIGNUP ──
  window.signup = async () => {
    const shopName = document.getElementById('shopName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    if (!shopName || !email || !password) {
      document.getElementById('authError').textContent = 'Please fill all fields.';
      return;
    }

    try {
      await createUserWithEmailAndPassword(auth, email, password);
      localStorage.setItem('shopName', shopName);
      showToast('Account created! Welcome to DealDrop 🎉');
    } catch (e) {
      document.getElementById('authError').textContent = e.message;
    }
  };

  // ── LOGIN ──
  window.login = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      document.getElementById('authError').textContent = 'Please fill all fields.';
      return;
    }

    try {
      await signInWithEmailAndPassword(auth, email, password);
      showToast('Welcome back! 👋');
    } catch (e) {
      document.getElementById('authError').textContent = 'Invalid email or password.';
    }
  };

  // ── LOGOUT ──
  document.getElementById('logoutBtn').addEventListener('click', (e) => {
    e.preventDefault();
    signOut(auth);
    showToast('Logged out successfully');
  });

  // ── POST DEAL ──
  window.postDeal = async () => {
    const btn = document.querySelector('button.primary');
    const productName = document.getElementById('productName').value.trim();
    const originalPrice = parseFloat(document.getElementById('originalPrice').value);
    const dealPrice = parseFloat(document.getElementById('dealPrice').value);
    const category = document.getElementById('category').value;
    const expiresInHours = parseInt(document.getElementById('expiresIn').value);
    const shopAddress = document.getElementById('shopAddress').value.trim();
    const shopName = localStorage.getItem('shopName') || 'My Shop';

    if (!productName || !originalPrice || !dealPrice || !shopAddress) {
      showToast('⚠️ Please fill all fields!');
      return;
    }

    if (dealPrice >= originalPrice) {
      showToast('⚠️ Deal price must be less than original price!');
      return;
    }

    // Show loading state
    btn.disabled = true;
    btn.innerHTML = '⏳ Posting...';

    const expiresAt = new Date();
    expiresAt.setHours(expiresAt.getHours() + expiresInHours);

    // Geocode address
    let lat = 13.0827;
    let lng = 80.2707;
    try {
      const geoRes = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(shopAddress)}`
      );
      const geoData = await geoRes.json();
      if (geoData.length > 0) {
        lat = parseFloat(geoData[0].lat);
        lng = parseFloat(geoData[0].lon);
      }
    } catch (e) {
      console.log('Geocoding failed, using default location');
    }

    try {
      await addDoc(collection(db, 'deals'), {
        productName,
        originalPrice,
        dealPrice,
        discount: Math.round(((originalPrice - dealPrice) / originalPrice) * 100),
        category,
        shopName,
        shopAddress,
        lat,
        lng,
        retailerId: currentUser.uid,
        createdAt: Timestamp.now(),
        expiresAt: Timestamp.fromDate(expiresAt),
        active: true
      });

      showToast('Deal posted successfully! 🚀');
      ['productName','originalPrice','dealPrice','shopAddress'].forEach(id => {
        document.getElementById(id).value = '';
      });

    } catch (e) {
      showToast('❌ Error posting deal. Try again.');
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '🚀 Post Deal';
    }
  };

  // ── LOAD MY DEALS ──
  function loadMyDeals() {
    const q = query(
      collection(db, 'deals'),
      where('retailerId', '==', currentUser.uid)
    );

    onSnapshot(q, (snapshot) => {
      const container = document.getElementById('myDeals');
      if (snapshot.empty) {
        container.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1;">
            <div class="icon">📦</div>
            <p>No deals posted yet.</p>
            <p style="font-size:0.85rem;margin-top:8px;color:var(--text-muted);">Post your first deal above to get started!</p>
          </div>
        `;
        document.getElementById('myDealCount').textContent = 0;
        document.getElementById('myActiveDeals').textContent = 0;
        document.getElementById('myTotalDeals').textContent = 0;
        document.getElementById('myExpiredDeals').textContent = 0;
        return;
      }

      container.innerHTML = '';
      const now = new Date();
      let activeCount = 0;
      let expiredCount = 0;

      snapshot.forEach(doc => {
        const d = doc.data();
        const expiry = d.expiresAt.toDate();
        const isExpired = expiry < now;
        const timeLeft = getTimeLeft(expiry);

        if (isExpired) expiredCount++;
        else activeCount++;

        const card = document.createElement('div');
        card.className = `card ${isExpired ? 'expired' : ''} fade-in-up`;
        card.innerHTML = `
          <div class="badge-row">
            <span class="badge badge-category">${d.category}</span>
            ${isExpired 
              ? '<span class="badge" style="background:rgba(255,255,255,0.1);color:var(--text-muted);border:1px solid rgba(255,255,255,0.1);">Expired</span>' 
              : '<span class="badge badge-active">Active</span>'}
          </div>
          <h3>${d.productName}</h3>
          <p>🏪 ${d.shopName}</p>
          <p>📍 ${d.shopAddress}</p>
          <div class="price-row">
            <span class="original-price">₹${d.originalPrice}</span>
            <span class="deal-price">₹${d.dealPrice}</span>
            <span class="discount-tag">${d.discount}% OFF</span>
          </div>
          ${!isExpired ? `<div class="countdown" data-expiry="${expiry.toISOString()}">⏳ ${timeLeft} left</div>` : ''}
        `;
        container.appendChild(card);
      });

      document.getElementById('myDealCount').textContent = snapshot.size;
      document.getElementById('myActiveDeals').textContent = activeCount;
      document.getElementById('myTotalDeals').textContent = snapshot.size;
      document.getElementById('myExpiredDeals').textContent = expiredCount;
    });
  }

  // ── LIVE COUNTDOWN TIMER ──
  setInterval(() => {
    document.querySelectorAll('.countdown[data-expiry]').forEach(el => {
      const expiry = new Date(el.dataset.expiry);
      const timeLeft = getTimeLeft(expiry);
      if (timeLeft === 'Expired') {
        el.innerHTML = '❌ Expired';
      } else {
        el.innerHTML = `⏳ ${timeLeft} left`;
      }
    });
  }, 1000);

  // ── HELPERS ──
  function getTimeLeft(expiryDate) {
    const diff = expiryDate - new Date();
    if (diff <= 0) return 'Expired';
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    if (h === 0 && m === 0) return `${s}s`;
    if (h === 0) return `${m}m ${s}s`;
    return `${h}h ${m}m`;
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }
</script>

</body>
</html>
