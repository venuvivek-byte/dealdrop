<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DealDrop – Find Hyperlocal Flash Deals Near You</title>
  <meta name="description" content="Discover amazing time-limited deals from local retailers near you. Save big on groceries, bakery, electronics and more with DealDrop.">
  <link rel="stylesheet" href="style.css" />
  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<nav>
  <h1>🏷️ DealDrop</h1>
  <div class="nav-links">
    <a href="retailer.html" class="btn-primary">I'm a Retailer →</a>
  </div>
</nav>

<div class="container">

  <!-- Stats Bar -->
  <div class="stats-bar fade-in-up">
    <div class="stat-item">
      <div class="stat-value" id="totalDeals">0</div>
      <div class="stat-label">Active Deals</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="totalShops">0</div>
      <div class="stat-label">Shops</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="bestDiscount">0%</div>
      <div class="stat-label">Best Discount</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="endingSoon">0</div>
      <div class="stat-label">Ending Soon</div>
    </div>
  </div>

  <!-- Search & Filter Bar -->
  <div class="search-bar fade-in-up stagger-1">
    <input type="text" id="searchInput" placeholder="🔍 Search deals, shops..." oninput="filterDeals()" />
    <select id="categoryFilter" onchange="filterDeals()">
      <option value="All">All Categories</option>
      <option value="Groceries">🥬 Groceries</option>
      <option value="Bakery">🍞 Bakery</option>
      <option value="Dairy">🥛 Dairy</option>
      <option value="Electronics">📱 Electronics</option>
      <option value="Clothing">👕 Clothing</option>
      <option value="Other">📦 Other</option>
    </select>
  </div>

  <!-- Map -->
  <p class="section-title fade-in-up stagger-2">🗺️ Deals Near You</p>
  <div id="map" class="fade-in-up stagger-2"></div>

  <!-- Deal Cards -->
  <p class="section-title fade-in-up stagger-3">
    🔥 Active Flash Deals 
    <span class="count" id="dealCount">0</span>
  </p>
  <div id="dealList" class="deal-grid">
    <!-- Skeleton Loading -->
    <div class="skeleton-card">
      <div class="skeleton skeleton-line short"></div>
      <div class="skeleton skeleton-line long"></div>
      <div class="skeleton skeleton-line medium"></div>
      <div class="skeleton skeleton-line short"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton skeleton-line short"></div>
      <div class="skeleton skeleton-line long"></div>
      <div class="skeleton skeleton-line medium"></div>
      <div class="skeleton skeleton-line short"></div>
    </div>
    <div class="skeleton-card">
      <div class="skeleton skeleton-line short"></div>
      <div class="skeleton skeleton-line long"></div>
      <div class="skeleton skeleton-line medium"></div>
      <div class="skeleton skeleton-line short"></div>
    </div>
  </div>

</div>

<div id="toast"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, onSnapshot, Timestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDEWiFeBiiXflPa7ADL6ijQ7NcMubIZScQ",
    authDomain: "dealdrop-16ea7.firebaseapp.com",
    projectId: "dealdrop-16ea7",
    storageBucket: "dealdrop-16ea7.firebasestorage.app",
    messagingSenderId: "482243986322",
    appId: "1:482243986322:web:7f74b0dcfa5cf5222fb74b",
    measurementId: "G-TTK180DJD5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── MAP SETUP ──
  const map = L.map('map', {
    zoomControl: false
  }).setView([13.0827, 80.2707], 13);

  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    maxZoom: 19
  }).addTo(map);

  // Custom marker icon
  const dealIcon = L.divIcon({
    className: 'custom-marker',
    html: '<div style="background:linear-gradient(135deg,#6c5ce7,#a29bfe);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 15px rgba(108,92,231,0.4);border:2px solid rgba(255,255,255,0.3);">🏷️</div>',
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });

  const userIcon = L.divIcon({
    className: 'custom-marker',
    html: '<div style="background:linear-gradient(135deg,#00b894,#55efc4);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 15px rgba(0,184,148,0.4);border:2px solid rgba(255,255,255,0.3);">📍</div>',
    iconSize: [36, 36],
    iconAnchor: [18, 18]
  });

  // Try to get user's real location
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 13);
      L.marker([pos.coords.latitude, pos.coords.longitude], { icon: userIcon })
        .addTo(map)
        .bindPopup('<div style="font-family:Inter,sans-serif;font-weight:600;text-align:center;">📍 You are here</div>')
        .openPopup();
    });
  }

  let allDeals = [];
  const markers = [];

  // ── LOAD DEALS FROM FIREBASE ──
  const now = Timestamp.now();
  const q = query(
    collection(db, 'deals'),
    where('active', '==', true),
    where('expiresAt', '>', now)
  );

  onSnapshot(q, (snapshot) => {
    allDeals = [];
    markers.forEach(m => map.removeLayer(m));
    markers.length = 0;

    snapshot.forEach(doc => {
      const d = { id: doc.id, ...doc.data() };
      allDeals.push(d);

      // Add custom map pin
      const marker = L.marker([d.lat, d.lng], { icon: dealIcon })
        .addTo(map)
        .bindPopup(`
          <div style="font-family:'Inter',sans-serif;min-width:180px;">
            <div style="font-weight:700;font-size:1rem;margin-bottom:4px;">${d.productName}</div>
            <div style="color:#666;font-size:0.85rem;">🏪 ${d.shopName}</div>
            <div style="margin:8px 0;">
              <span style="text-decoration:line-through;color:#999;">₹${d.originalPrice}</span>
              <span style="font-weight:800;color:#ff6b6b;font-size:1.1rem;margin-left:6px;">₹${d.dealPrice}</span>
            </div>
            <div style="color:#00b894;font-weight:700;font-size:0.9rem;">${d.discount}% OFF</div>
            <div style="color:#ff6b6b;font-size:0.8rem;margin-top:4px;">⏳ ${getTimeLeft(d.expiresAt.toDate())}</div>
          </div>
        `);
      markers.push(marker);
    });

    updateStats(allDeals);
    renderDeals(allDeals);
  });

  // ── UPDATE STATS BAR ──
  function updateStats(deals) {
    document.getElementById('totalDeals').textContent = deals.length;
    const shops = new Set(deals.map(d => d.shopName));
    document.getElementById('totalShops').textContent = shops.size;
    const maxDiscount = deals.length > 0 ? Math.max(...deals.map(d => d.discount)) : 0;
    document.getElementById('bestDiscount').textContent = maxDiscount + '%';
    const ending = deals.filter(d => (d.expiresAt.toDate() - new Date()) / 3600000 < 1).length;
    document.getElementById('endingSoon').textContent = ending;
    document.getElementById('dealCount').textContent = deals.length;
  }

  // ── RENDER DEAL CARDS ──
  window.renderDeals = function(deals) {
    const container = document.getElementById('dealList');

    if (deals.length === 0) {
      container.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="icon">🔍</div>
          <p>No active deals found in your area right now.</p>
          <p style="font-size:0.85rem;margin-top:8px;color:#6b6b80;">Check back later or try a different category!</p>
        </div>
      `;
      return;
    }

    container.innerHTML = '';
    deals.forEach((d, index) => {
      const expiryDate = d.expiresAt.toDate();
      const urgency = getUrgencyBadge(expiryDate);
      const dealId = `deal-timer-${d.id}`;

      const card = document.createElement('div');
      card.className = `card fade-in-up`;
      card.style.animationDelay = `${index * 0.08}s`;
      card.style.cursor = 'pointer';
      card.onclick = () => flyTo(d.lat, d.lng);
      card.innerHTML = `
        <div class="badge-row">
          <span class="badge badge-category">${d.category}</span>
          <span class="badge ${urgency.class}">${urgency.label}</span>
        </div>
        <h3>${d.productName}</h3>
        <p>🏪 ${d.shopName}</p>
        <p>📍 ${d.shopAddress}</p>
        <div class="price-row">
          <span class="original-price">₹${d.originalPrice}</span>
          <span class="deal-price">₹${d.dealPrice}</span>
          <span class="discount-tag">${d.discount}% OFF</span>
        </div>
        <div class="countdown ${urgency.isUrgent ? 'urgent' : ''}" id="${dealId}" data-expiry="${expiryDate.toISOString()}">
          ⏳ ${getTimeLeft(expiryDate)} left
        </div>
      `;
      container.appendChild(card);
    });
  };

  // ── LIVE COUNTDOWN TIMER ──
  setInterval(() => {
    document.querySelectorAll('.countdown[data-expiry]').forEach(el => {
      const expiry = new Date(el.dataset.expiry);
      const timeLeft = getTimeLeft(expiry);
      if (timeLeft === 'Expired') {
        el.innerHTML = '❌ Expired';
        el.closest('.card')?.classList.add('expired');
      } else {
        el.innerHTML = `⏳ ${timeLeft} left`;
      }
    });
    // Update ending soon count
    if (allDeals.length > 0) {
      const ending = allDeals.filter(d => {
        const diff = (d.expiresAt.toDate() - new Date()) / 3600000;
        return diff > 0 && diff < 1;
      }).length;
      document.getElementById('endingSoon').textContent = ending;
    }
  }, 1000);

  // ── FLY TO LOCATION ON MAP ──
  window.flyTo = function(lat, lng) {
    map.flyTo([lat, lng], 16, { duration: 1.2 });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // ── FILTER DEALS ──
  window.filterDeals = function() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;

    const filtered = allDeals.filter(d => {
      const matchSearch = d.productName.toLowerCase().includes(search) ||
                          d.shopName.toLowerCase().includes(search);
      const matchCategory = category === 'All' || d.category === category;
      return matchSearch && matchCategory;
    });

    renderDeals(filtered);
    document.getElementById('dealCount').textContent = filtered.length;
  };

  // ── HELPERS ──
  function getTimeLeft(expiryDate) {
    const diff = expiryDate - new Date();
    if (diff <= 0) return 'Expired';
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    if (h === 0 && m === 0) return `${s}s`;
    if (h === 0) return `${m}m ${s}s`;
    return `${h}h ${m}m`;
  }

  function getUrgencyBadge(expiryDate) {
    const diff = expiryDate - new Date();
    const hours = diff / 3600000;
    if (hours < 1) return { class: 'badge-ending', label: '🔥 Ending Soon!', isUrgent: true };
    if (hours < 3) return { class: 'badge-hot', label: '⚡ Hot Deal', isUrgent: false };
    return { class: 'badge-active', label: '✅ Active', isUrgent: false };
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }
</script>

</body>
</html>
