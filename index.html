<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DealDrop – Find Hyperlocal Flash Deals Near You</title>
  <meta name="description" content="Discover amazing time-limited deals from local retailers near you. Save big on groceries, bakery, electronics and more with DealDrop.">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

<nav>
  <h1>
    <span class="logo-icon">🏷️</span>
    DealDrop
  </h1>
  <div class="nav-links">
    <a href="retailer.html" class="btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12a2 2 0 0 1-2-2V7"/></svg>
      I'm a Retailer
    </a>
  </div>
</nav>

<div class="container">

  <!-- Stats Bar -->
  <div class="stats-bar fade-in-up">
    <div class="stat-item">
      <div class="stat-value" id="totalDeals">0</div>
      <div class="stat-label">Active Deals</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="totalShops">0</div>
      <div class="stat-label">Shops Near You</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="bestDiscount">0%</div>
      <div class="stat-label">Best Discount</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="endingSoon">0</div>
      <div class="stat-label">Ending Soon</div>
    </div>
  </div>

  <!-- Search & Filter -->
  <div class="search-bar fade-in-up stagger-1">
    <input type="text" id="searchInput" placeholder="Search deals, shops, categories..." oninput="filterDeals()" />
    <select id="categoryFilter" onchange="filterDeals()">
      <option value="All">All Categories</option>
      <option value="Groceries">🥬 Groceries</option>
      <option value="Bakery">🍞 Bakery</option>
      <option value="Dairy">🥛 Dairy</option>
      <option value="Electronics">📱 Electronics</option>
      <option value="Clothing">👕 Clothing</option>
      <option value="Other">📦 Other</option>
    </select>
  </div>

  <!-- Map Section -->
  <div class="section-title fade-in-up stagger-2">
    <span class="icon">📍</span> Deals Near You
  </div>
  <div id="map" class="fade-in-up stagger-2"></div>

  <!-- Deal Cards -->
  <div class="section-title fade-in-up stagger-3">
    <span class="icon">🔥</span> Active Flash Deals
    <span class="count" id="dealCount">0</span>
  </div>
  <div id="dealList" class="deal-grid">
    <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line long"></div><div class="skeleton skeleton-line medium"></div><div class="skeleton skeleton-line short"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line long"></div><div class="skeleton skeleton-line medium"></div><div class="skeleton skeleton-line short"></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line long"></div><div class="skeleton skeleton-line medium"></div><div class="skeleton skeleton-line short"></div></div>
  </div>

</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, onSnapshot, Timestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDEWiFeBiiXflPa7ADL6ijQ7NcMubIZScQ",
    authDomain: "dealdrop-16ea7.firebaseapp.com",
    projectId: "dealdrop-16ea7",
    storageBucket: "dealdrop-16ea7.firebasestorage.app",
    messagingSenderId: "482243986322",
    appId: "1:482243986322:web:7f74b0dcfa5cf5222fb74b",
    measurementId: "G-TTK180DJD5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── Navbar scroll effect ──
  window.addEventListener('scroll', () => {
    document.querySelector('nav').classList.toggle('scrolled', window.scrollY > 10);
  });

  // ── MAP SETUP ──
  const map = L.map('map', {
    zoomControl: false
  }).setView([13.0827, 80.2707], 13);

  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19
  }).addTo(map);

  // Custom map markers
  function createDealIcon(emoji) {
    return L.divIcon({
      className: '',
      html: `<div style="
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        width: 36px; height: 36px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px;
        box-shadow: 0 4px 20px rgba(99,102,241,0.5);
        border: 2.5px solid rgba(255,255,255,0.4);
        transition: transform 0.2s;
      ">${emoji}</div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 18]
    });
  }

  const userIcon = L.divIcon({
    className: '',
    html: `<div style="
      background: linear-gradient(135deg, #10b981, #34d399);
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 24px rgba(16,185,129,0.5), 0 4px 16px rgba(0,0,0,0.3);
      border: 2.5px solid rgba(255,255,255,0.5);
      animation: userPulse 2s infinite;
    ">📍</div>
    <style>@keyframes userPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.4)}50%{box-shadow:0 0 0 12px rgba(16,185,129,0)}}</style>`,
    iconSize: [40, 40],
    iconAnchor: [20, 20]
  });

  const categoryIcons = {
    'Groceries': '🥬', 'Bakery': '🍞', 'Dairy': '🥛',
    'Electronics': '📱', 'Clothing': '👕', 'Other': '📦'
  };

  // User location
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 13);
      L.marker([pos.coords.latitude, pos.coords.longitude], { icon: userIcon })
        .addTo(map)
        .bindPopup(`<div style="font-family:Inter,sans-serif;font-weight:700;text-align:center;padding:4px;">📍 You are here</div>`)
        .openPopup();
    });
  }

  let allDeals = [];
  const markers = [];

  // ── LOAD DEALS ──
  const now = Timestamp.now();
  const q = query(
    collection(db, 'deals'),
    where('active', '==', true),
    where('expiresAt', '>', now)
  );

  onSnapshot(q, (snapshot) => {
    allDeals = [];
    markers.forEach(m => map.removeLayer(m));
    markers.length = 0;

    snapshot.forEach(doc => {
      const d = { id: doc.id, ...doc.data() };
      allDeals.push(d);

      const icon = createDealIcon(categoryIcons[d.category] || '🏷️');
      const marker = L.marker([d.lat, d.lng], { icon })
        .addTo(map)
        .bindPopup(`
          <div style="font-family:'Inter',sans-serif;min-width:200px;padding:4px;">
            <div style="font-weight:800;font-size:1.05rem;margin-bottom:6px;color:#1a1a2e;">${d.productName}</div>
            <div style="color:#666;font-size:0.85rem;margin-bottom:2px;">🏪 ${d.shopName}</div>
            <div style="color:#888;font-size:0.8rem;margin-bottom:8px;">📍 ${d.shopAddress}</div>
            <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px;">
              <span style="text-decoration:line-through;color:#aaa;font-size:0.85rem;">₹${d.originalPrice}</span>
              <span style="font-weight:900;color:#f43f5e;font-size:1.2rem;">₹${d.dealPrice}</span>
            </div>
            <div style="display:flex;gap:8px;">
              <span style="color:#10b981;font-weight:700;font-size:0.85rem;">${d.discount}% OFF</span>
              <span style="color:#f43f5e;font-size:0.8rem;">⏳ ${getTimeLeft(d.expiresAt.toDate())}</span>
            </div>
          </div>
        `);
      markers.push(marker);
    });

    updateStats(allDeals);
    renderDeals(allDeals);
  });

  // ── STATS ──
  function updateStats(deals) {
    document.getElementById('totalDeals').textContent = deals.length;
    document.getElementById('totalShops').textContent = new Set(deals.map(d => d.shopName)).size;
    document.getElementById('bestDiscount').textContent = (deals.length > 0 ? Math.max(...deals.map(d => d.discount)) : 0) + '%';
    const ending = deals.filter(d => (d.expiresAt.toDate() - new Date()) / 3600000 < 1).length;
    document.getElementById('endingSoon').textContent = ending;
    document.getElementById('dealCount').textContent = deals.length;
  }

  // ── RENDER CARDS ──
  window.renderDeals = function(deals) {
    const container = document.getElementById('dealList');

    if (deals.length === 0) {
      container.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="icon">🔍</div>
          <p>No active deals found in your area right now.</p>
          <p class="sub">Check back later or try a different category!</p>
        </div>`;
      return;
    }

    container.innerHTML = '';
    deals.forEach((d, i) => {
      const expiryDate = d.expiresAt.toDate();
      const urgency = getUrgencyBadge(expiryDate);
      const dealId = `deal-timer-${d.id}`;

      const card = document.createElement('div');
      card.className = 'card fade-in-up';
      card.style.animationDelay = `${i * 0.06}s`;
      card.style.cursor = 'pointer';
      card.onclick = () => flyTo(d.lat, d.lng);
      card.innerHTML = `
        <div class="badge-row">
          <span class="badge badge-category">${categoryIcons[d.category] || '📦'} ${d.category}</span>
          <span class="badge ${urgency.class}">${urgency.label}</span>
        </div>
        <h3>${d.productName}</h3>
        <p>🏪 ${d.shopName}</p>
        <p>📍 ${d.shopAddress}</p>
        <div class="price-row">
          <span class="original-price">₹${d.originalPrice}</span>
          <span class="deal-price">₹${d.dealPrice}</span>
          <span class="discount-tag">${d.discount}% OFF</span>
        </div>
        <div class="countdown ${urgency.isUrgent ? 'urgent' : ''}" id="${dealId}" data-expiry="${expiryDate.toISOString()}">
          ⏳ ${getTimeLeft(expiryDate)} left
        </div>
      `;
      container.appendChild(card);
    });
  };

  // ── LIVE TIMERS ──
  setInterval(() => {
    document.querySelectorAll('.countdown[data-expiry]').forEach(el => {
      const expiry = new Date(el.dataset.expiry);
      const timeLeft = getTimeLeft(expiry);
      el.innerHTML = timeLeft === 'Expired' ? '❌ Expired' : `⏳ ${timeLeft} left`;
      if (timeLeft === 'Expired') el.closest('.card')?.classList.add('expired');
    });
    if (allDeals.length > 0) {
      const ending = allDeals.filter(d => {
        const diff = (d.expiresAt.toDate() - new Date()) / 3600000;
        return diff > 0 && diff < 1;
      }).length;
      document.getElementById('endingSoon').textContent = ending;
    }
  }, 1000);

  // ── FLY TO ──
  window.flyTo = function(lat, lng) {
    map.flyTo([lat, lng], 16, { duration: 1.2 });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // ── FILTER ──
  window.filterDeals = function() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;
    const filtered = allDeals.filter(d => {
      const matchSearch = d.productName.toLowerCase().includes(search) || d.shopName.toLowerCase().includes(search);
      const matchCategory = category === 'All' || d.category === category;
      return matchSearch && matchCategory;
    });
    renderDeals(filtered);
    document.getElementById('dealCount').textContent = filtered.length;
  };

  // ── HELPERS ──
  function getTimeLeft(expiryDate) {
    const diff = expiryDate - new Date();
    if (diff <= 0) return 'Expired';
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    if (h === 0 && m === 0) return `${s}s`;
    if (h === 0) return `${m}m ${s}s`;
    return `${h}h ${m}m`;
  }

  function getUrgencyBadge(expiryDate) {
    const hours = (expiryDate - new Date()) / 3600000;
    if (hours < 1) return { class: 'badge-ending', label: '🔥 Ending Soon!', isUrgent: true };
    if (hours < 3) return { class: 'badge-hot', label: '⚡ Hot Deal', isUrgent: false };
    return { class: 'badge-active', label: '✅ Active', isUrgent: false };
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }
</script>

</body>
</html>
